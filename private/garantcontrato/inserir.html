<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedStock - Inserir Garantia e Contrato</title>

    <link rel="stylesheet" href="../../assets/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../../assets/css/estilos.css">
    <link rel="stylesheet" href="../../assets/fontawesome/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body class="pagprivada">

    <aside class="sidebar">

        <nav>
            <a href="../index.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="listar.html"><i class="fa-solid fa-stethoscope"></i> Equipamentos</a>
            <a href="../fornecedores/listar.html"><i class="fa-solid fa-truck"></i> Fornecedores</a>
            <a href="../localizacao/listar.html"><i class="fa-solid fa-location-dot"></i> Localização</a>
            <a href="../garantcontrato/listar.html"><i class="fa-solid fa-file-contract"></i> Garantias/Contratos</a>
            <a href="../documentacao/listar.html"><i class="fa-solid fa-folder-open"></i> Documentação</a>
        </nav>
    </aside>

    <header class="topbar">
        <div class="logo-topbar">
            <img src="../../assets/img/logHospital.png" alt="Logo MedStock">
            <h1>MedStock</h1>
        </div>

        <div class="user-button">
            <i class="fa-regular fa-user"></i>
            <span>Utilizador</span>
            <i class="fa-solid fa-chevron-down seta"></i>

            <ul class="user-dropdown">
                <li><a href="#">Mudar password</a></li>
                <li><a href="../public/login.html">Sair</a></li>
            </ul>
        </div>
    </header>


    <main class="conteudo">

    <h1 class="mb-4">Inserir Garantia e contrato</h1>

    <form class="shadow p-4 rounded" style="max-width: 850px;">

        <div class="row mb-3">
            <div class="col">
                <label class="form-label">Equipamento</label>
                <select class="form-select" name="equipamento">
                    <option value="">Selecione...</option>
                    <!-- PHP -->
                </select>
            </div>

            <div class="col">
                <label class="form-label">Fornecedor</label>
                <select class="form-select" name="fornecedor">
                    <option value="">Selecione...</option>
                    <!-- PHP -->
                </select>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col">
                <label class="form-label">Tipo de Contrato</label>
                <select class="form-select" name="tipo">
                    <option value="">Selecione...</option>
                    <option>Garantia</option>
                    <option>Contrato de Manutenção</option>
                    <option>Assistência Técnica</option>
                </select>
            </div>

            <div class="col">
                <label class="form-label">Periodicidade</label>
                <select class="form-select" name="periodicidade">
                    <option value="">Selecione...</option>
                    <option>Mensal</option>
                    <option>Trimestral</option>
                    <option>Semestral</option>
                    <option>Anual</option>
                </select>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col">
                <label class="form-label">Data de Início</label>
                <input type="date" class="form-control" name="data_inicio">
            </div>

            <div class="col">
                <label class="form-label">Data de Fim</label>
                <input type="date" class="form-control" name="data_fim">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Observações</label>
            <textarea class="form-control" rows="4" name="observacoes"></textarea>
        </div>

        
        <div class="d-flex justify-content-between mt-4">
            <a href="listar.html" class="btn btn-secondary">
                <i class="fa-solid fa-arrow-left"></i> Voltar
            </a>

            <button type="submit" class="btn btn-success">
                <i class="fa-solid fa-check"></i> Guardar
            </button>
        </div>

    </form>

</main>
