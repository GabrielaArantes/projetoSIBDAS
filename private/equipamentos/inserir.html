<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedStock - Inserir Equipamentos</title>

    <link rel="stylesheet" href="../../assets/css/estilos.css">
    <link rel="stylesheet" href="../../assets/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../../assets/fontawesome/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="pagprivada">

    <aside class="sidebar">
        
        <nav>
            <a href="../index.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="listar.html"><i class="fa-solid fa-stethoscope"></i> Equipamentos</a>
            <a href="../fornecedores/listar.html"><i class="fa-solid fa-truck"></i> Fornecedores</a>
            <a href="../localizacao/listar.html"><i class="fa-solid fa-location-dot"></i> Localização</a>
            <a href="../garantcontrato/listar.html"><i class="fa-solid fa-file-contract"></i> Garantias/Contratos</a>
            <a href="../documentacao/listar.html"><i class="fa-solid fa-folder-open"></i> Documentação</a>
        </nav>
    </aside>

    <header class="topbar">
        <div class="logo-topbar">
            <img src="../../assets/img/logHospital.png" alt="Logo MedStock">
            <h1>MedStock</h1>
        </div>
    </header>

    <main class="conteudo">
        <h1>Adicionar Novo Equipamento</h1>

         <form class="mt-4">

            <div class="mb-3">
                <label class="form-label">Nome do Equipamento</label>
                <input type="text" class="form-control" placeholder="Ex: Monitor Cardíaco">
            </div>

            <div class="mb-3">
                <label class="form-label">Categoria</label>
                <input type="text" class="form-control" placeholder="Ex: Monitorização">
            </div>

            <div class="mb-3">
                <label class="form-label">Localização</label>
                <select class="form-select">
                    <option selected disabled>Selecione...</option>
                    <option>Bloco Operatório</option>
                    <option>Urgências</option>
                    <option>Cuidados Intensivos</option>
                </select>
            </div>

        <div class="mb-3">
                <label class="form-label">Estado</label>
                <select class="form-select">
                    <option>Ativo</option>
                    <option>Inativo</option>
                    <option>Em Manutenção</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Descrição</label>
                <textarea class="form-control" rows="4" placeholder="Informações adicionais sobre o equipamento"></textarea>
            </div>

            <button type="submit" class="btn btn-success">
                <i class="fa-solid fa-check"></i> Guardar
            </button>

            <a href="listar.html" class="btn btn-secondary ms-2">
                <i class="fa-solid fa-arrow-left"></i> Voltar
            </a>
        
        </form>
    </main>

</body>
</html>
